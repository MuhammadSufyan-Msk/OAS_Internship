<div class="task-card">
    <h2>My Internship Roadmap</h2>
    <ul>
        @for (task of tasks(); track task.id) {
        <li [style.text-decoration]="task.completed ? 'line-through' : 'none'">
            <input type="checkbox" [checked]="task.completed" (change)="toggleTask(task.id)">
            {{ task.title }}
        </li>
        } @empty {
        <li>No tasks found. Time to relax!</li>
        }
    </ul>
</div>
