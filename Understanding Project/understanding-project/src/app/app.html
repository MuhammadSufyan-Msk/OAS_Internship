<main class="main">
  <div class="content">
    <div class="left-side">
      <h1>Hello, {{ title() }}</h1>
      <p>Designation: <strong>{{ profession() }}</strong></p>

      <nav class="nav-container">
        <button routerLink="/" routerLinkActive="active-btn" [routerLinkActiveOptions]="{exact: true}">
          Go to Home
        </button>

        <button routerLink="/about" routerLinkActive="active-btn">
          Go to About
        </button>
      </nav>

      <div class="outlet-container">
        <router-outlet />
      </div>

    </div>
  </div>
</main>
